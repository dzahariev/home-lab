apiVersion: apps/v1
kind: Deployment
metadata:
  name: invval
  namespace: invval
spec:
  template:
    spec:
      containers:
      - name: invval
        env:
        - name: KEYCLOAK_URL
          value: "https://auth.zahariev.com"
        - name: BASE_URL
          value: "https://invval.zahariev.com"
