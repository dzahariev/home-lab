apiVersion: v1
kind: PersistentVolume
metadata:
  name: mealie-data-pv
spec:
  nfs:
    server: 192.168.0.55
    path: /mnt/data/mealie
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mealie-db-pv
spec:
  local:
    path: /data/mealiedb
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - atlas
