apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bento
  namespace: bento
spec:
  rules:
  - host: bento.zahariev.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bento
            port:
              number: 8080
  tls:
  - hosts:
    - bento.zahariev.com
    secretName: bento-tls
