apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: convertx
  namespace: convertx
spec:
  rules:
  - host: convertx.zahariev.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: convertx
            port:
              number: 3000
  tls:
  - hosts:
    - convertx.zahariev.com
    secretName: convertx-tls
