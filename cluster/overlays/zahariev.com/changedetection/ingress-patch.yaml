apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: changedetection
  namespace: changedetection
spec:
  rules:
  - host: changedetection.zahariev.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: changedetection
            port:
              number: 5000
  tls:
  - hosts:
    - changedetection.zahariev.com
    secretName: changedetection-tls
