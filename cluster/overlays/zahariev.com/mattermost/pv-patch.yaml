apiVersion: v1
kind: PersistentVolume
metadata:
  name: mattermost-db-pv
spec:
  local:
    path: /data/mattermostdb
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - atlas
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mattermost-data-pv
spec:
  local:
    path: /data/mattermost
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - atlas
