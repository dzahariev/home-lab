apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mattermost
  namespace: mattermost
spec:
  rules:
  - host: mattermost.zahariev.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mattermost
            port:
              number: 8065
  tls:
  - hosts:
    - mattermost.zahariev.com
    secretName: mattermost-tls
