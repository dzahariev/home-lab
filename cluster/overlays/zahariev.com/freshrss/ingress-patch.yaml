apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freshrss
  namespace: freshrss
spec:
  rules:
  - host: freshrss.zahariev.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: freshrss
            port:
              number: 80
  tls:
  - hosts:
    - freshrss.zahariev.com
    secretName: freshrss-tls
