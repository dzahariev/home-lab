apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtrack
  namespace: youtrack
  labels:
    app: youtrack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: youtrack
  template:
    metadata:
      labels:
        app: youtrack
    spec:
      containers:
      - name: youtrack
        image: jetbrains/youtrack:2025.3.120863
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: data
          mountPath: /opt/youtrack/data
          subPath: data
        - name: data
          mountPath: /opt/youtrack/conf
          subPath: conf
        - name: data
          mountPath: /opt/youtrack/logs
          subPath: logs
        - name: data
          mountPath: /opt/youtrack/backups
          subPath: backups
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: youtrack-data
