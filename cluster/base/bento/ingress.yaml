apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bento
  namespace: bento
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
  - host: bento.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bento
            port:
              number: 8080
  tls:
  - hosts:
    - bento.example.com
    secretName: bento-tls
