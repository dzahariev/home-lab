apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-data-pv
spec:
  capacity:
    storage: 50Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: monitoring
    name: prometheus-data
  storageClassName: nfs-storage
  nfs:
    server: <nfs-server>
    path: /mdata/prometheus
---
