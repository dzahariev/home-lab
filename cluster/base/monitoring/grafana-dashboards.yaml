        {
          "datasource": {"type": "prometheus", "uid": ""},
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 1},
          "id": 2,
          "options": {"tooltip": {"mode": "multi", "sort": "desc"}},
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{node=~\"$node\", namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{namespace}}"
            }
          ],
          "title": "CPU by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": ""},
