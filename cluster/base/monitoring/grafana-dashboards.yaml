      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["kubernetes", "resources", "namespaces", "workloads"],
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": {"type": "prometheus", "uid": ""},
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
