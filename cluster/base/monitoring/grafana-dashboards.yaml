apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  cluster-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "CPU Usage per Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          }
        },
        {
          "title": "Memory Usage per Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          }
        },
        {
          "title": "Disk Usage per Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"rootfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"rootfs\"} * 100)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          }
        },
        {
          "title": "Network Traffic per Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m])",
              "legendFormat": "{{instance}} rx {{device}}"
            },
            {
              "expr": "-rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m])",
              "legendFormat": "{{instance}} tx {{device}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "Bps" },
            "overrides": []
          }
        },
        {
          "title": "Pods Running per Namespace",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "count by (namespace) (kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "title": "Pod Restarts (last 1h)",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total[1h]) > 0",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true }, "includeByName": { "namespace": true, "pod": true, "container": true, "Value": true } } }
          ]
        },
        {
          "title": "Node Conditions",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "kube_node_status_condition{condition=\"Ready\",status=\"true\"}",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "Not Ready", "color": "red" }, "1": { "text": "Ready", "color": "green" } } }
              ]
            },
            "overrides": []
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["kubernetes", "cluster"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Cluster Overview",
      "uid": "cluster-overview"
    }
  node-details.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{instance=~\"$node\",mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU Used %"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          }
        },
        {
          "title": "Memory",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes{instance=~\"$node\"} - node_memory_MemAvailable_bytes{instance=~\"$node\"}",
              "legendFormat": "Used"
            },
            {
              "expr": "node_memory_MemAvailable_bytes{instance=~\"$node\"}",
              "legendFormat": "Available"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": []
          }
        },
        {
          "title": "Disk I/O",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "rate(node_disk_read_bytes_total{instance=~\"$node\",device!~\"loop.*\"}[5m])",
              "legendFormat": "Read {{device}}"
            },
            {
              "expr": "-rate(node_disk_written_bytes_total{instance=~\"$node\",device!~\"loop.*\"}[5m])",
              "legendFormat": "Write {{device}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "Bps" },
            "overrides": []
          }
        },
        {
          "title": "Filesystem Usage",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (node_filesystem_avail_bytes{instance=~\"$node\",fstype!~\"tmpfs|overlay\",mountpoint!~\"/run.*|/sys.*|/proc.*\"} / node_filesystem_size_bytes{instance=~\"$node\",fstype!~\"tmpfs|overlay\",mountpoint!~\"/run.*|/sys.*|/proc.*\"} * 100)",
              "legendFormat": "{{mountpoint}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "title": "System Load",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            { "expr": "node_load1{instance=~\"$node\"}", "legendFormat": "1m" },
            { "expr": "node_load5{instance=~\"$node\"}", "legendFormat": "5m" },
            { "expr": "node_load15{instance=~\"$node\"}", "legendFormat": "15m" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["kubernetes", "node"],
      "templating": {
        "list": [
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "" },
            "query": "label_values(node_uname_info, instance)",
            "refresh": 2,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Node Details",
      "uid": "node-details"
    }
  k8s-resource-usage.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
