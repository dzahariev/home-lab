              "expr": "sum by (namespace, deployment) (label_replace(rate(container_cpu_usage_seconds_total{node=~\"$node\", namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}[5m]) * on(namespace, pod) group_left(owner_name) kube_pod_owner{namespace=~\"$namespace\", owner_kind=\"ReplicaSet\"}, \"deployment\", \"$1\", \"owner_name\", \"^(.*)-[a-z0-9]+$\"))",
              "legendFormat": "{{namespace}}/{{deployment}}"
