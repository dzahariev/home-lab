apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskboard
  namespace: taskboard
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
  - host: taskboard.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: taskboard
            port:
              number: 8800
  tls:
  - hosts:
    - taskboard.example.com
    secretName: taskboard-tls
