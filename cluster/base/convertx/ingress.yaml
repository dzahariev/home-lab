apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: convertx
  namespace: convertx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
  - host: convertx.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: convertx
            port:
              number: 3000
  tls:
  - hosts:
    - convertx.example.com
    secretName: convertx-tls
