apiVersion: v1
kind: PersistentVolume
metadata:
  name: calibre-config-pv
spec:
  capacity:
    storage: 500Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: calibre
    name: calibre-config
  storageClassName: nfs-storage
  nfs:
    server: <nfs-server>
    path: /data/calibre
